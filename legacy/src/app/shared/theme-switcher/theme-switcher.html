<label
  tabindex="0"
  for="theme-switch"
  class="focus:ring-primary relative flex h-10 w-10 cursor-pointer items-center justify-center overflow-hidden rounded-md border border-slate-300 transition outline-none focus:ring-offset-4 focus:ring-offset-white focus:outline-none md:focus:ring-2 dark:focus:ring-offset-black"
  (keyup)="toggleTheme($event)"
>
  <input
    id="theme-switch"
    type="checkbox"
    class="hidden"
    [checked]="theme()"
    (click)="toggleTheme()"
  />

  @if (theme() === 'light') {
    <svg
      [@upward]="theme() === 'light'"
      xmlns="http://www.w3.org/2000/svg"
      class="absolute h-7 w-7"
      viewBox="0 0 24 24"
    >
      <path
        class="text-yellow-400"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="currentColor"
        stroke="currentColor"
        d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"
      />
    </svg>
  }

  @if (theme() === 'dark') {
    <svg
      [@upward]="theme() === 'dark'"
      class="absolute h-6 w-6"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
    >
      <path
        class="text-white"
        fill="currentColor"
        stroke-width="1.5"
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"
      />
    </svg>
  }

  @if (theme() === 'system') {
    <svg
      [@upward]="theme() === 'system'"
      class="absolute h-8 w-8"
      clip-rule="evenodd"
      fill-rule="evenodd"
      stroke-linejoin="round"
      stroke-miterlimit="2"
      viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="m12 5.462c3.609 0 6.538 2.929 6.538 6.538s-2.929 6.538-6.538 6.538-6.538-2.929-6.538-6.538 2.929-6.538 6.538-6.538zm-2.508 2.756c-1.223.813-2.03 2.204-2.03 3.782 0 2.505 2.033 4.538 4.538 4.538 1.423 0 2.694-.656 3.527-1.683-.173-.023-.344-.05-.512-.081-2.899-.526-4.916-2.287-5.371-4.93-.081-.473-.146-1.018-.152-1.626zm1.508-5.218c0-.552.448-1 1-1s1 .448 1 1v.551c0 .552-.448 1-1 1s-1-.448-1-1zm6.657 1.929c.39-.39 1.024-.39 1.414 0s.39 1.024 0 1.414l-.389.39c-.391.39-1.024.39-1.415 0-.39-.391-.39-1.024 0-1.415zm3.343 6.071c.552 0 1 .448 1 1s-.448 1-1 1h-.551c-.552 0-1-.448-1-1s.448-1 1-1zm-1.929 6.657c.39.39.39 1.024 0 1.414s-1.024.39-1.414 0l-.39-.389c-.39-.391-.39-1.024 0-1.415.391-.39 1.024-.39 1.415 0zm-6.071 3.343c0 .552-.448 1-1 1s-1-.448-1-1v-.551c0-.552.448-1 1-1s1 .448 1 1zm-6.657-1.929c-.39.39-1.024.39-1.414 0s-.39-1.024 0-1.414l.389-.39c.391-.39 1.024-.39 1.415 0 .39.391.39 1.024 0 1.415zm-3.343-6.071c-.552 0-1-.448-1-1s.448-1 1-1h.551c.552 0 1 .448 1 1s-.448 1-1 1zm1.929-6.657c-.39-.39-.39-1.024 0-1.414s1.024-.39 1.414 0l.39.389c.39.391.39 1.024 0 1.415-.391.39-1.024.39-1.415 0z"
      />
    </svg>
  }
</label>
