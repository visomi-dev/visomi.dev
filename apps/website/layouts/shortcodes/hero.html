<section class="relative flex min-h-screen items-center justify-center pt-20">
  <!-- Background -->
  <div class="bg-grid absolute inset-0 -z-10"></div>
  <div class="animate-blob absolute top-1/4 -left-20 h-96 w-96 rounded-full bg-blue-500/20 blur-3xl"></div>
  <div
    class="animate-blob animation-delay-2000 absolute top-1/3 -right-20 h-96 w-96 rounded-full bg-purple-500/20 blur-3xl"
  ></div>

  <div class="mx-auto max-w-5xl px-4 text-center">
    <!-- Badge -->
    <div class="mb-8 inline-flex items-center gap-2 rounded-full border border-neutral-700 bg-neutral-800/50 px-4 py-2">
      <span class="h-2 w-2 animate-pulse rounded-full bg-green-500"></span>
      <span class="font-mono text-xs">{{ i18n "homeHeroBadge" }}</span>
    </div>

    <!-- Title -->
    <h1 class="mb-6 text-5xl leading-tight font-bold md:text-7xl">
      <span class="block">{{ i18n "homeHeroTitleLine1" }}</span>
      <span
        class="block bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent"
        >{{ i18n "homeHeroTitleLine2" }}</span
      >
    </h1>

    <!-- Subtitle -->
    <p class="mx-auto mb-10 max-w-2xl text-lg text-gray-400 md:text-xl">
      {{ i18n "homeHeroSubtitle" }}
    </p>

    <!-- CTA Buttons -->
    <div class="flex flex-col items-center justify-center gap-4 sm:flex-row">
      <a
        href="/projects"
        class="rounded-full bg-white px-8 py-3 font-medium text-black transition-colors hover:bg-gray-200"
      >
        {{ i18n "homeHeroCtaWork" }}
      </a>
      <a
        href="/resume"
        class="rounded-full border border-neutral-700 px-8 py-3 transition-colors hover:border-neutral-500"
      >
        {{ i18n "homeHeroCtaCv" }}
      </a>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-bounce">
    <svg class="h-6 w-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
    </svg>
  </div>
</section>
