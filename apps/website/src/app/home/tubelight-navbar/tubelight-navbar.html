<div class="fixed bottom-0 left-1/2 z-50 mb-6 w-fit -translate-x-1/2 sm:top-0 sm:bottom-auto sm:pt-6">
  <div class="relative flex items-center gap-1 rounded-full bg-slate-900/40 p-1 shadow-2xl backdrop-blur-xl">
    <!-- Lamp / Active Indicator (CSS Transition) -->
    <div
      class="cubic-bezier(0.34,1.56,0.64,1) pointer-events-none absolute -z-10 h-[calc(100%-8px)] rounded-2xl border border-blue-500/20 bg-blue-500/10 transition-all duration-500"
      [style.left.px]="lampPosition().left"
      [style.width.px]="lampPosition().width"
    >
      <div class="absolute -top-2 left-1/2 h-1 w-8 -translate-x-1/2 rounded-t-full bg-blue-400">
        <div class="absolute -top-2 -left-2 h-6 w-12 rounded-2xl bg-blue-400/20 blur-md"></div>
        <div class="absolute -top-1 h-6 w-8 rounded-2xl bg-blue-400/20 blur-md"></div>
        <div class="absolute top-0 left-2 h-4 w-4 rounded-2xl bg-blue-400/20 blur-sm"></div>
      </div>
    </div>

    @for (item of items(); track item.name) {
      <a
        #navItem
        [href]="item.url"
        (click)="setActive(item.name)"
        class="relative flex min-w-11 cursor-pointer items-center justify-center rounded-2xl px-4 py-2 text-sm font-medium transition-colors duration-300 sm:px-6"
        [class.text-white]="activeTab() === item.name"
        [class.text-slate-400]="activeTab() !== item.name"
        [class.hover:text-slate-200]="activeTab() !== item.name"
      >
        <span class="hidden md:inline">{{ item.name }}</span>
        <span class="pi md:hidden" [class]="item.icon"></span>
      </a>
    }
  </div>
</div>
