<div
  #navContainer
  class="tubelight-navbar__track flex items-center gap-3 rounded-full border border-border bg-background/5 px-1 py-1 shadow-lg backdrop-blur-lg"
>
  <div
    class="tubelight-navbar__lamp absolute inset-y-0 -z-10 rounded-full bg-primary/5"
    [style.left.px]="lampPosition().left"
    [style.width.px]="lampPosition().width"
    aria-hidden="true"
  >
    <div class="tubelight-navbar__lamp-bulb absolute -top-2 left-1/2 h-1 w-8 -translate-x-1/2 rounded-t-full bg-primary">
      <div class="absolute -top-2 -left-2 h-6 w-12 rounded-full bg-primary/20 blur-md" aria-hidden="true"></div>
      <div class="absolute -top-1 h-6 w-8 rounded-full bg-primary/20 blur-md" aria-hidden="true"></div>
      <div class="absolute top-0 left-2 h-4 w-4 rounded-full bg-primary/20 blur-sm" aria-hidden="true"></div>
    </div>
  </div>
  @for (item of items(); track item.name) {
    <div
      #navItem
      class="tubelight-navbar__item relative z-10"
    >
      <a
        [routerLink]="item.url"
        (click)="setActive(item.name)"
        class="tubelight-navbar__link relative cursor-pointer rounded-full px-6 py-2 text-sm font-semibold transition-colors text-foreground/80 hover:text-primary"
        [class.bg-muted]="activeTab() === item.name"
        [class.text-primary]="activeTab() === item.name"
        [attr.aria-current]="activeTab() === item.name ? 'page' : null"
      >
        <span class="hidden md:inline">{{ item.name }}</span>
        @if (iconTemplate()) {
          <span class="tubelight-navbar__icon md:hidden inline-flex" [attr.aria-hidden]="true">
            <ng-container
              [ngTemplateOutlet]="iconTemplate()!"
              [ngTemplateOutletContext]="{ $implicit: item }"
            />
          </span>
        } @else {
          <span class="md:hidden">{{ item.name }}</span>
        }
      </a>
    </div>
  }
</div>
