<div class="fixed top-0 right-0 z-50 pt-6 pr-6">
  <div class="relative flex items-center gap-1 rounded-full bg-slate-900/40 p-1 shadow-2xl backdrop-blur-xl">
    <!-- Lamp / Active Indicator (CSS Transition) -->
    <div
      class="cubic-bezier(0.34,1.56,0.64,1) pointer-events-none absolute -z-10 h-[calc(100%-0.5rem)] rounded-2xl border border-blue-500/20 bg-blue-500/10 transition-all duration-500"
      [style.left.px]="lampPosition().left"
      [style.width.px]="lampPosition().width"
    >
      <div class="absolute -bottom-1 left-1/2 h-1 w-8 -translate-x-1/2 rounded-b-full bg-blue-400">
        <div class="absolute -bottom-2 -left-2 h-6 w-12 rounded-2xl bg-blue-400/20 blur-md"></div>
        <div class="absolute -bottom-1 h-6 w-8 rounded-2xl bg-blue-400/20 blur-md"></div>
        <div class="absolute bottom-0 left-2 h-4 w-4 rounded-2xl bg-blue-400/20 blur-sm"></div>
      </div>
    </div>

    @for (lang of languages; track lang.code) {
      <a
        #langItem
        [href]="getLanguageLink(lang.code)"
        class="relative flex min-w-11 cursor-pointer items-center justify-center rounded-2xl px-4 py-2 text-sm font-medium transition-colors duration-300 2xl:text-2xl"
        [class.text-white]="isActive(lang.code)"
        [class.text-slate-400]="!isActive(lang.code)"
        [class.hover:text-slate-200]="!isActive(lang.code)"
        [class.pointer-events-none]="isActive(lang.code)"
      >
        <span>{{ lang.name }}</span>
      </a>
    }
  </div>
</div>
