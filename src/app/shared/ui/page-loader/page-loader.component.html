@if (loading() || navigating() || authenticating()) {
  <div
    class="fixed inset-0 z-40 h-screen w-screen bg-black bg-opacity-25 dark:bg-soft-gray dark:bg-opacity-10"
    [@inOutAnimation]
  >
    <div
      class="page-loader-indicator fixed top-0 z-50 h-1 w-1/4 rounded bg-primary"
    ></div>
  </div>
}
