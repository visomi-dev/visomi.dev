<div class="flex flex-col gap-2">
  <div class="rounded-full">
    <img
      class="h-full w-full"
      src="assets/images/resume/me.jpg"
      alt="Michael V. S."
      width="128"
      height="128"
    />
  </div>

  <div class="flex flex-col">
    <h1 class="text-2xl font-bold">Michael Villalba Sotelo</h1>

    <p class="text-sm" i18n="@@resumePersonalInfoAge">{{ age }} years old</p>
  </div>

  <div class="flex flex-col">
    <h2
      class="text-xl font-bold text-slate-700"
      i18n="@@resumePersonalInfoTitle"
    >
      Full-Stack Developer
    </h2>

    <p class="text-sm" i18n="@@resumePersonalInfoExp">
      {{ experience }} years of experience
    </p>
  </div>
</div>
