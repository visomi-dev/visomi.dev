<header
  class="z-10 flex w-full items-center justify-between bg-white px-6 py-7"
>
  <nav class="mx-auto flex w-full max-w-2xl justify-between">
    <img
      src="/assets/images/logotype.svg"
      alt="visomi personal logotype"
      alt-i18n="@@homeHeaderLogoAlt"
    />

    <div class="flex items-center justify-end md:flex-1">
      <button
        class="md:pointer-events-none md:opacity-0"
        (click)="toggleMenu()"
      >
        <img
          src="/assets/images/menu.svg"
          alt="hamburger menu icon"
          alt-i18n="@@homeHeaderMenuIconAlt"
        />
      </button>

      <ul
        [ngClass]="[
          'fixed left-0 top-0 z-40 w-full flex-col overflow-hidden transition-all duration-500 md:relative md:flex md:max-h-screen md:w-fit md:flex-row md:gap-4',
          !open()
            ? 'max-h-0'
            : 'flex max-h-screen before:fixed before:left-0 before:top-0 before:z-10 before:h-screen before:w-screen before:bg-black before:bg-opacity-50 md:before:hidden',
        ]"
        (click)="closeMenu()"
        (keypress)="closeMenu()"
        tabindex="0"
      >
        @for (item of items; track $index) {
          <li class="z-20 flex w-full bg-white px-6 py-4 md:w-fit md:p-0">
            <a
              [ngClass]="[
                'w-full px-2 py-1 text-center text-2xl md:p-0 md:text-base',
                item.color,
              ]"
              [href]="item.href"
            >
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </div>
  </nav>
</header>
